name: Sync Resume to Portfolio

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'resume.pdf'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout resume repo
        uses: actions/checkout@v6
        with:
          lfs: true

      - name: Checkout portfolio repo
        uses: actions/checkout@v6
        with:
          repository: masonsxu/masonsxu.github.io
          token: ${{ secrets.PORTFOLIO_PAT }}
          path: portfolio
          lfs: true

      - name: Copy resume PDF
        run: cp resume.pdf portfolio/public/resume.pdf

      - name: Remove PDF from LFS tracking
        working-directory: portfolio
        run: |
          git lfs untrack "*.pdf" || true
          git add .gitattributes 2>/dev/null || true

      - name: Commit and push
        working-directory: portfolio
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/resume.pdf
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: 同步简历PDF（来自 resume 仓库）"
            git push
          fi
